    padding: 24px 20px;
  }
  .wrap { max-width: 940px; margin: 0 auto; }
  h1 {
    font-size: 28px; font-weight: 700; letter-spacing: -0.02em; display: inline;
    background: linear-gradient(135deg, #4AEDC4, #7B8CFF);

  }
  .sub { font-size: 14px; color: rgba(255,255,255,0.3); margin-left: 12px; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px; margin: 8px 0 20px;
    padding: 4px 10px; border-radius: 12px;
    background: rgba(74,237,196,0.1); border: 1px solid rgba(74,237,196,0.2);
  }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #4AEDC4; box-shadow: 0 0 6px #4AEDC4; }
  .badge-text { font-size: 10px; color: #4AEDC4; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px; padding: 14px 16px;
  }
  .stat-label { font-size: 10px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .stat-value { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .stat-change { font-size: 12px; font-weight: 500; }
  .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
  .periods { display: flex; gap: 4px; background: rgba(255,255,255,0.04); border-radius: 8px; padding: 3px; }
  .periods button {
    padding: 8px 18px; border-radius: 6px; border: 1px solid transparent; cursor: pointer;
    font-size: 13px; font-weight: 600; font-family: inherit; transition: all 0.2s;
    background: transparent; color: rgba(255,255,255,0.35);
  }
  .periods button.active {
    background: linear-gradient(135deg, rgba(74,237,196,0.2), rgba(123,140,255,0.2));
    border-color: rgba(74,237,196,0.3); color: #fff;
  }
  .toggles { display: flex; gap: 8px; }
  .toggle {
    display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 6px;
    cursor: pointer; font-size: 11px; font-family: inherit; font-weight: 500; transition: all 0.2s;
    border: 1px solid rgba(255,255,255,0.08); background: transparent; color: rgba(255,255,255,0.3);
  }
  .toggle.active { }
  .toggle-dot { width: 8px; height: 8px; border-radius: 2px; background: rgba(255,255,255,0.15); transition: all 0.2s; }
  .chart-box {
    background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px; padding: 20px 16px 12px; height: 460px; cursor: crosshair;
  }
  .compare {
    margin-top: 12px; padding: 14px 16px; border-radius: 10px;
    background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
    transition: all 0.3s;
  }
  .compare.hidden { display: none; }
  .compare-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  .compare-points { display: flex; gap: 24px; flex-wrap: wrap; }
  .compare-point { font-size: 11px; color: rgba(255,255,255,0.5); }
  .compare-point span { color: #fff; font-weight: 600; }
  .compare-result { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .compare-pct {
    font-size: 16px; font-weight: 700; padding: 4px 12px; border-radius: 6px;
  }
  .compare-pct.up { color: #4AEDC4; background: rgba(74,237,196,0.1); border: 1px solid rgba(74,237,196,0.2); }
  .compare-pct.down { color: #FF6B6B; background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.2); }
  .compare-btn {
    padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.5);
    cursor: pointer; font-size: 11px; font-family: inherit; transition: all 0.2s;
  }
  .compare-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .compare-hint {
    margin-top: 10px; font-size: 10px; color: rgba(255,255,255,0.2); text-align: center;
    transition: opacity 0.3s;
  }
  .compare-hint.hidden { opacity: 0; }
  .footer { margin-top: 16px; font-size: 10px; color: rgba(255,255,255,0.2); display: flex; justify-content: space-between; }
  @media (max-width: 600px) {

  }

const ALL = RAW.map(r => ({ date: r[0], ts: new Date(r[0]).getTime(), sp: r[1], fx: r[2], nok: r[3] }));

const PERIODS = [
  { label: "1M", days: 30 },
  { label: "1Y", days: 365 },
  { label: "3Y", days: 1095 },
  { label: "5Y", days: 1825 },
];

let period = "1Y";
let showNOK = true, showUSD = true, showFX = false;
let chart = null;

function sma(arr, key, win) {
  const result = [];
  for (let i = 0; i < arr.length; i++) {
    const start = Math.max(0, i - win + 1);
    let sum = 0, count = 0;
    for (let j = start; j <= i; j++) { sum += arr[j][key]; count++; }
    result.push(sum / count);
  }
  return result;
}

function getData() {
  const p = PERIODS.find(x => x.label === period);
  const cutoff = Date.now() - p.days * 864e5;
  let data = ALL.filter(d => d.ts >= cutoff);
  if (period === "5Y" || period === "3Y") {
    const step = period === "5Y" ? 5 : 3;
    data = data.filter((_, i) => i % step === 0 || i === data.length - 1);
  }
  const baseSP = data[0]?.sp || 1;
  const baseNOK = data[0]?.nok || 1;
  const win = period === "1M" ? 5 : period === "1Y" ? 15 : period === "3Y" ? 10 : 12;
  const fxSMA = sma(data, "fx", win);
  return data.map((d, i) => ({
    ...d,
    spIdx: (d.sp / baseSP) * 100,
    nokIdx: (d.nok / baseNOK) * 100,
    fxSmooth: fxSMA[i],
  }));
}

function fmtNOK(v) { return v >= 1e6 ? (v/1e6).toFixed(1)+"M" : v >= 1e3 ? (v/1e3).toFixed(0)+"k" : v.toFixed(0); }
function fmtUSD(v) { return v >= 1e3 ? (v/1e3).toFixed(1)+"k" : v.toFixed(0); }

function updateStats(data) {
  const first = data[0], last = data[data.length - 1];
  const pct = (a, b) => b ? ((a - b) / b * 100) : 0;
  const items = [
    { label: "S&P 500 (NOK)", value: fmtNOK(last.nok) + " kr", change: pct(last.nok, first.nok), color: "#4AEDC4" },
    { label: "S&P 500 (USD)", value: "$" + fmtUSD(last.sp), change: pct(last.sp, first.sp), color: "#7B8CFF" },
    { label: "USD/NOK", value: last.fx.toFixed(2), change: pct(last.fx, first.fx), color: "#FF8C6B" },
  ];
  document.getElementById("stats").innerHTML = items.map(s => `
    <div class="stat">
      <div class="stat-label">${s.label}</div>
      <div class="stat-value" style="color:${s.color}">${s.value}</div>
      <div class="stat-change" style="color:${s.change >= 0 ? '#4AEDC4' : '#FF6B6B'}">
        ${s.change >= 0 ? '▲' : '▼'} ${Math.abs(s.change).toFixed(1)}%
        <span style="color:rgba(255,255,255,0.25);margin-left:4px">${period}</span>
      </div>
    </div>
  `).join("");
}

function fmtDateLabel(dateStr) {
  const d = new Date(dateStr);
  if (period === "1M") return d.toLocaleDateString("no-NO", { day: "numeric", month: "short" });
  if (period === "1Y") return d.toLocaleDateString("no-NO", { month: "short", year: "2-digit" });
  return d.toLocaleDateString("no-NO", { month: "short", year: "numeric" });
}

function buildChart() {
  // Register custom tooltip positioner — pins tooltip to top of chart
  Chart.Tooltip.positioners.topFixed = function(elements, eventPosition) {
    if (!elements.length) return false;
    const chartArea = this.chart.chartArea;
    return { x: eventPosition.x, y: chartArea.top + 8 };
  };
  const data = getData();
  updateStats(data);

  const labels = data.map(d => d.date);
  const datasets = [];

  if (showNOK) datasets.push({
    label: "S&P 500 (NOK)",
    data: data.map(d => d.nokIdx),
    borderColor: "#4AEDC4",
    backgroundColor: "rgba(74,237,196,0.08)",
    borderWidth: 2, fill: true, tension: 0.3,
    pointRadius: 0, pointHoverRadius: 5,
    pointHoverBackgroundColor: "#4AEDC4",
    pointHoverBorderColor: "#0a0a0f",
    pointHoverBorderWidth: 2,
    yAxisID: "yIdx",
  });
  if (showUSD) datasets.push({
    label: "S&P 500 (USD)",
    data: data.map(d => d.spIdx),
    borderColor: "#7B8CFF",
    backgroundColor: "rgba(123,140,255,0.05)",
    borderWidth: 1.5, fill: true, tension: 0.3,
    pointRadius: 0, pointHoverRadius: 5,
    pointHoverBackgroundColor: "#7B8CFF",
    pointHoverBorderColor: "#0a0a0f",
    pointHoverBorderWidth: 2,
    yAxisID: "yIdx",
  });
  if (showFX) {
    datasets.push({
      label: "USD/NOK (raw)",
      data: data.map(d => d.fx),
      borderColor: "rgba(255,140,107,0.2)",
      backgroundColor: "transparent",
      borderWidth: 0.8, fill: false, tension: 0.1,
      pointRadius: 0, pointHoverRadius: 0,
      yAxisID: "yFx",
    });
    datasets.push({
      label: "USD/NOK (SMA)",
      data: data.map(d => d.fxSmooth),
      borderColor: "#FF8C6B",
      backgroundColor: "transparent",
      borderWidth: 2, fill: false, tension: 0.3,
      pointRadius: 0, pointHoverRadius: 5,
      pointHoverBackgroundColor: "#FF8C6B",
      pointHoverBorderColor: "#0a0a0f",
      pointHoverBorderWidth: 2,
      yAxisID: "yFx",
    });
  }

  const scales = {};
  if (showNOK || showUSD) {
    scales.yIdx = {
      type: "linear", position: "left",
      grid: { color: "rgba(255,255,255,0.04)", drawBorder: false },
      ticks: { color: "rgba(255,255,255,0.4)", font: { size: 10, family: "'JetBrains Mono'" }, callback: v => v.toFixed(0) + "%" },
      border: { display: false },
    };
  }
  if (showFX) {
    scales.yFx = {
      type: "linear", position: "right",
      grid: { drawOnChartArea: false },
      ticks: { color: "rgba(255,140,107,0.5)", font: { size: 10, family: "'JetBrains Mono'" }, callback: v => v.toFixed(1) },
      border: { display: false },
    };
  }
  scales.x = {
    grid: { color: "rgba(255,255,255,0.04)", drawBorder: false },
    ticks: {
      color: "rgba(255,255,255,0.3)", font: { size: 10, family: "'JetBrains Mono'" },
      maxTicksLimit: 10, callback: function(val, i) { return fmtDateLabel(this.getLabelForValue(val)); },
    },
    border: { display: false },
  };

  const annotations = {};
  if (showNOK || showUSD) {
    annotations.baseline = {
      type: "line", yMin: 100, yMax: 100, yScaleID: "yIdx",
      borderColor: "rgba(255,255,255,0.15)", borderDash: [6, 4], borderWidth: 1,
    };
  }

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      events: ("ontouchstart" in window)
        ? ["mousemove", "mouseout", "click"]
        : ["mousemove", "mouseout", "click", "touchstart", "touchmove"],
      interaction: { mode: "index", intersect: false },
      scales,
      plugins: {
        legend: { display: false },
        annotation: { annotations },
        tooltip: {
          position: "topFixed",
          caretSize: 0,
          backgroundColor: "rgba(10,10,15,0.96)",
          borderColor: "rgba(255,255,255,0.1)",
          borderWidth: 1,
          titleColor: "rgba(255,255,255,0.45)",
          titleFont: { size: 11, family: "'JetBrains Mono'" },
          bodyFont: { size: 12, family: "'JetBrains Mono'" },
          padding: 12,
          cornerRadius: 8,
          displayColors: true,
          boxWidth: 8, boxHeight: 8, boxPadding: 4,
          callbacks: {
            title: function(items) {
              const d = new Date(items[0].label);
              return d.toLocaleDateString("no-NO", { day: "numeric", month: "long", year: "numeric" });
            },
            label: function(ctx) {
              const i = ctx.dataIndex;
              const d = getData()[i];
              if (!d) return ctx.dataset.label + ": " + ctx.formattedValue;
              if (ctx.dataset.label === "S&P 500 (NOK)") {
                const pct = (d.nokIdx - 100).toFixed(1);
                return "NOK: " + d.nok.toLocaleString("no-NO", {maximumFractionDigits:0}) + " kr  " + (pct >= 0 ? "+" : "") + pct + "%";
              }
              if (ctx.dataset.label === "S&P 500 (USD)") {
                const pct = (d.spIdx - 100).toFixed(1);
                return "USD: $" + d.sp.toLocaleString("en-US", {maximumFractionDigits:0}) + "  " + (pct >= 0 ? "+" : "") + pct + "%";
              }
              if (ctx.dataset.label === "USD/NOK (SMA)") return "FX SMA: " + d.fxSmooth.toFixed(2);
              if (ctx.dataset.label === "USD/NOK (raw)") return "FX: " + d.fx.toFixed(2);
              return ctx.formattedValue;
            },
          },
        },
      },
    },
  });
}

// Build period buttons
document.getElementById("periods").innerHTML = PERIODS.map(p =>
  `<button data-p="${p.label}" class="${p.label === period ? 'active' : ''}">${p.label}</button>`
).join("");
document.getElementById("periods").addEventListener("click", e => {
  if (!e.target.dataset.p) return;
  period = e.target.dataset.p;
  document.querySelectorAll(".periods button").forEach(b => b.classList.toggle("active", b.dataset.p === period));
  buildChart();
});

// Build series toggles
function renderToggles() {
  const items = [
    { key: "nok", label: "NOK", color: "#4AEDC4", active: showNOK },
    { key: "usd", label: "USD", color: "#7B8CFF", active: showUSD },
    { key: "fx", label: "FX", color: "#FF8C6B", active: showFX },
  ];
  document.getElementById("toggles").innerHTML = items.map(s => `
    <button class="toggle ${s.active ? 'active' : ''}" data-key="${s.key}"
      style="border-color:${s.active ? s.color+'44' : 'rgba(255,255,255,0.08)'};
             background:${s.active ? s.color+'15' : 'transparent'};
             color:${s.active ? s.color : 'rgba(255,255,255,0.3)'}">
      <div class="toggle-dot" style="background:${s.active ? s.color : 'rgba(255,255,255,0.15)'}"></div>
      ${s.label}
    </button>
  `).join("");
}
renderToggles();
document.getElementById("toggles").addEventListener("click", e => {
  const btn = e.target.closest("[data-key]");
  if (!btn) return;
  const k = btn.dataset.key;
  if (k === "nok") showNOK = !showNOK;
  if (k === "usd") showUSD = !showUSD;
  if (k === "fx") showFX = !showFX;
  renderToggles();
  clearCompare();
  buildChart();
});

buildChart();

// --- Click-to-compare ---
let picks = [];

function fmtShortDate(dateStr) {
  return new Date(dateStr).toLocaleDateString("no-NO", { day: "numeric", month: "short", year: "numeric" });
}

function clearCompare() {
  picks = [];
  document.getElementById("compare").classList.add("hidden");
  const hint = document.getElementById("compare-hint");
  hint.classList.remove("hidden");
  hint.innerHTML = "Click (or hold on mobile) two points to compare";
  if (chart && chart.options.plugins.annotation) {
    const anns = chart.options.plugins.annotation.annotations;
    delete anns.pickA;
    delete anns.pickB;
    chart.update();
  }
}

function renderCompare() {
  if (picks.length < 2) return;
  const [a, b] = picks[0].data.ts < picks[1].data.ts ? [picks[0], picks[1]] : [picks[1], picks[0]];
  const da = a.data, db = b.data;

  const pctNOK = ((db.nok - da.nok) / da.nok * 100);
  const pctUSD = ((db.sp - da.sp) / da.sp * 100);
  const pctFX = ((db.fx - da.fx) / da.fx * 100);

  const pill = (label, val, color) => {
    const cls = val >= 0 ? "up" : "down";
    const sign = val >= 0 ? "+" : "";
    return `<span style="color:${color};font-size:11px;margin-right:2px">${label}</span><span class="compare-pct ${cls}">${sign}${val.toFixed(1)}%</span>`;
  };

  document.getElementById("compare-content").innerHTML = `
    <div class="compare-points">
      <div class="compare-point">A: <span>${fmtShortDate(da.date)}</span></div>
      <div class="compare-point" style="margin-left:4px">→</div>
      <div class="compare-point">B: <span>${fmtShortDate(db.date)}</span></div>
    </div>
    <div class="compare-result">
      ${showNOK ? pill("NOK", pctNOK, "#4AEDC4") : ""}
      ${showUSD ? pill("USD", pctUSD, "#7B8CFF") : ""}
      ${pill("FX", pctFX, "#FF8C6B")}
    </div>
  `;
  document.getElementById("compare").classList.remove("hidden");
  document.getElementById("compare-hint").classList.add("hidden");

  if (chart && chart.options.plugins.annotation) {
    const anns = chart.options.plugins.annotation.annotations;
    anns.pickA = {
      type: "line", xMin: a.index, xMax: a.index, borderColor: "rgba(255,255,255,0.35)", borderWidth: 1, borderDash: [4, 3],
      label: { display: true, content: "A", position: "start", backgroundColor: "rgba(255,255,255,0.15)", color: "#fff", font: { size: 10, family: "'JetBrains Mono'" }, padding: 4 },
    };
    anns.pickB = {
      type: "line", xMin: b.index, xMax: b.index, borderColor: "rgba(255,255,255,0.35)", borderWidth: 1, borderDash: [4, 3],
      label: { display: true, content: "B", position: "start", backgroundColor: "rgba(255,255,255,0.15)", color: "#fff", font: { size: 10, family: "'JetBrains Mono'" }, padding: 4 },
    };
    chart.update();
  }
}

document.getElementById("chart").addEventListener("click", function(e) {
  if (!chart) return;
  const points = chart.getElementsAtEventForMode(e, "index", { intersect: false }, false);
  if (!points.length) return;
  const idx = points[0].index;
  const data = getData()[idx];
  if (!data) return;

  if (picks.length >= 2) {
    picks = [];
    if (chart.options.plugins.annotation) {
      const anns = chart.options.plugins.annotation.annotations;
      delete anns.pickA;
      delete anns.pickB;
      chart.update();
    }
    document.getElementById("compare").classList.add("hidden");
  }

  picks.push({ index: idx, data });

  if (picks.length === 1) {
    document.getElementById("compare-hint").innerHTML = "Now click a second point to compare";
    if (chart.options.plugins.annotation) {
      chart.options.plugins.annotation.annotations.pickA = {
        type: "line", xMin: idx, xMax: idx, borderColor: "rgba(255,255,255,0.4)", borderWidth: 1, borderDash: [4, 3],
        label: { display: true, content: "A", position: "start", backgroundColor: "rgba(255,255,255,0.15)", color: "#fff", font: { size: 10, family: "'JetBrains Mono'" }, padding: 4 },
      };
      chart.update();
    }
  } else if (picks.length === 2) {
    renderCompare();
  }
});

document.getElementById("compare-clear").addEventListener("click", clearCompare);

// Also clear compare when switching periods
document.getElementById("periods").addEventListener("click", function() { clearCompare(); }, true);

// --- Mobile long-press tooltip ---
let touchTimer = null;
let touchActive = false;
let touchStartPos = null;
const HOLD_MS = 600; // slightly less than 1s for responsiveness
const MOVE_THRESHOLD = 10; // px movement before cancelling hold

const canvas = document.getElementById("chart");

function getTouchIndex(e) {
  if (!chart) return -1;
  const rect = canvas.getBoundingClientRect();
  const x = e.touches[0].clientX - rect.left;
  const y = e.touches[0].clientY - rect.top;
  const elements = chart.getElementsAtEventForMode(
    { x, y, native: e }, "index", { intersect: false }, false
  );
  return elements.length ? elements[0].index : -1;
}

function showTooltipAt(e) {
  if (!chart) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.touches[0].clientX - rect.left;
  const y = e.touches[0].clientY - rect.top;
  const elements = chart.getElementsAtEventForMode(
    { x, y, native: e }, "index", { intersect: false }, false
  );
  if (!elements.length) return;
  const activeEls = elements.map(el => ({
    datasetIndex: el.datasetIndex, index: el.index
  }));
  chart.setActiveElements(activeEls);
  chart.tooltip.setActiveElements(activeEls, { x, y });
  chart.update("none");
}

function hideTooltip() {
  if (!chart) return;
  chart.setActiveElements([]);
  chart.tooltip.setActiveElements([], { x: 0, y: 0 });
  chart.update("none");
}

canvas.addEventListener("touchstart", function(e) {
  if (e.touches.length !== 1) return;
  touchStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  touchTimer = setTimeout(function() {
    touchActive = true;
    // Haptic feedback if available
    if (navigator.vibrate) navigator.vibrate(30);
    canvas.style.outline = "2px solid rgba(74,237,196,0.4)";
    canvas.style.outlineOffset = "-2px";
    showTooltipAt(e);
  }, HOLD_MS);
}, { passive: true });

canvas.addEventListener("touchmove", function(e) {
  if (!touchActive && touchStartPos) {
    // Cancel hold if finger moved too much
    const dx = e.touches[0].clientX - touchStartPos.x;
    const dy = e.touches[0].clientY - touchStartPos.y;
    if (Math.abs(dx) > MOVE_THRESHOLD || Math.abs(dy) > MOVE_THRESHOLD) {
      clearTimeout(touchTimer);
      touchTimer = null;
      touchStartPos = null;
      return;
    }
  }
  if (touchActive) {
    e.preventDefault(); // lock scroll
    showTooltipAt(e);
  }
}, { passive: false });

canvas.addEventListener("touchend", function(e) {
  clearTimeout(touchTimer);
  touchTimer = null;
  touchStartPos = null;
  if (touchActive) {
    // Handle compare pick on release
    const rect = canvas.getBoundingClientRect();
    const lastTouch = e.changedTouches[0];
    const x = lastTouch.clientX - rect.left;
    const y = lastTouch.clientY - rect.top;
    const elements = chart.getElementsAtEventForMode(
      { x, y, native: e }, "index", { intersect: false }, false
    );
    if (elements.length) {
      const idx = elements[0].index;
      const data = getData()[idx];
      if (data) {
        if (picks.length >= 2) {
          picks = [];
          if (chart.options.plugins.annotation) {
            const anns = chart.options.plugins.annotation.annotations;
            delete anns.pickA; delete anns.pickB;
            chart.update();
          }
          document.getElementById("compare").classList.add("hidden");
        }
        picks.push({ index: idx, data });
        if (picks.length === 1) {
          document.getElementById("compare-hint").innerHTML = "Hold again on a second point to compare";
          if (chart.options.plugins.annotation) {
            chart.options.plugins.annotation.annotations.pickA = {
              type: "line", xMin: idx, xMax: idx, borderColor: "rgba(255,255,255,0.4)", borderWidth: 1, borderDash: [4, 3],
              label: { display: true, content: "A", position: "start", backgroundColor: "rgba(255,255,255,0.15)", color: "#fff", font: { size: 10, family: "'JetBrains Mono'" }, padding: 4 },
            };
            chart.update();
          }
        } else if (picks.length === 2) {
          renderCompare();
        }
      }
    }
    touchActive = false;
    canvas.style.outline = "none";
    setTimeout(hideTooltip, 1500); // keep tooltip visible briefly
  } else {
    touchActive = false;
  }
}, { passive: true });

</script>
